# Release workflow — triggered by pushing a version tag (v1.2.3).
#
# What it does:
#   1. Checks out the code at the tag
#   2. Builds a tarball (frogman-<version>.tgz) from `git archive` — only tracked
#      files, so anything untracked in the dev box can't accidentally leak in
#   3. Creates a GitHub Release at that tag, uploads the tarball, uses the tag's
#      annotation message as the release body
#
# What it does NOT do (intentional — keep these manual):
#   - Bump module.xml version
#   - Write changelog entries
#   - Deploy to the dev box
#   - File GHSAs
#   - Update memory
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   GPG_PRIVATE_KEY  Armored private key with publisher trust signature from
#                    FreePBX Module Signing v2 master (1588A7366BD35B34).
#                    Generated via: gpg --export-secret-keys --armor <KEYID>
#   GPG_PASSPHRASE   Passphrase that unlocks GPG_PRIVATE_KEY. Used to import
#                    the key + preset its passphrase in the gpg-agent so
#                    sign.php's clearsign call runs unattended.
#
# To ship a release: bump module.xml, commit, then:
#   git tag -a v1.6.4 -m "$(cat <<EOF
#   v1.6.4 — bug-fix sweep
#   ...release notes here...
#   EOF
#   )"
#   git push origin v1.6.4
#
# The workflow appears in the Actions tab, builds the tarball, and the release
# shows up at /releases/tag/v1.6.4 with the tarball attached.

name: Release

on:
  push:
    tags:
      # Stable releases only — three numeric parts. Rejects pre-release tags
      # like v1.6.4-rc1 since git-glob doesn't treat the suffix specially.
      # (gh-actions tag filters are gitignore-style globs; * matches anything
      # not including /. So 'v*.*.*' matches v1.6.4 and would also match
      # v1.6.4-rc1; deliberately keep that case lax — we trust the maintainer
      # not to push pre-release tags from main.)
      - 'v*.*.*'

permissions:
  contents: write  # required to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4

      - name: Fetch annotated tag object
        run: |
          set -euo pipefail
          # The default checkout fetches `+<commit-sha>:refs/tags/<name>` with
          # --no-tags. The local `refs/tags/<name>` ends up pointing straight
          # at the commit — the annotated tag OBJECT is never downloaded, and
          # `git for-each-ref %(contents)` returns the commit message instead
          # of the tag annotation. v1.6.8 shipped with the commit subject as
          # its release body because of this.
          #
          # Using `with: fetch-tags: true` on the checkout step instead causes
          # a refspec conflict (the action's default `+<sha>:refs/tags/<name>`
          # and the tag-fetch's `+refs/tags/*:refs/tags/*` both write the same
          # destination — "Cannot fetch both" fatal). v1.6.9's first attempt
          # broke on exactly that. The surgical fix is to fetch the tag ref
          # explicitly here after checkout: the `+refs/tags/X:refs/tags/X`
          # refspec downloads the annotated tag object and overwrites the
          # lightweight local ref left by the checkout action.
          TAG="${GITHUB_REF#refs/tags/}"
          git fetch --depth=1 --no-tags origin "+refs/tags/${TAG}:refs/tags/${TAG}"

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tarball=/tmp/frogman-${VERSION}.tgz" >> "$GITHUB_OUTPUT"

      - name: Extract tracked files
        run: |
          set -euo pipefail
          # Only tracked files end up here — orphans / .gitignore'd files can't
          # sneak in. The signing step (next) writes module.sig into this dir,
          # then the tarball step packs it up.
          mkdir -p /tmp/release
          git archive --format=tar HEAD --prefix=frogman/ | tar -xf - -C /tmp/release

      - name: Set up GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          # Import the signing private key + preset passphrase in the agent so
          # sign.php's `gpg --clearsign` call (which has no flag to pass a
          # passphrase) finds it cached. Mirrors the dev-box flow used 2026-05-28.
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          {
            echo "allow-preset-passphrase"
            echo "default-cache-ttl 7200"
            echo "max-cache-ttl 7200"
          } > ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

          echo "$GPG_PRIVATE_KEY" | gpg --batch --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" --import

          KEYGRIP=$(gpg --with-keygrip --list-secret-keys \
            | awk '/Keygrip/ {print $3; exit}')
          # gpg-preset-passphrase isn't on $PATH (sits under /usr/lib/gnupg{,2}).
          PRESET=$(find /usr/lib /usr/libexec -name gpg-preset-passphrase 2>/dev/null \
            | head -1)
          test -x "$PRESET" || { echo "gpg-preset-passphrase not found"; exit 1; }
          "$PRESET" --preset "$KEYGRIP" <<< "$GPG_PASSPHRASE"

      - name: Sign module
        run: |
          set -euo pipefail
          # Use Sangoma's canonical signing script (FreePBX/devtools/sign.php).
          # Passing the keyid as an explicit arg bypasses validateKey()'s lookup
          # for a Mirror Servers sig — our key carries the v2 master tsign
          # instead, which sign.php's auto-detect doesn't recognize.
          git clone --depth 1 https://github.com/FreePBX/devtools.git /tmp/devtools
          KEYID='021979A8A1002442'
          php /tmp/devtools/sign.php /tmp/release/frogman "$KEYID"
          test -f /tmp/release/frogman/module.sig
          head -1 /tmp/release/frogman/module.sig \
            | grep -q 'BEGIN PGP SIGNED MESSAGE'

      - name: Build tarball
        run: |
          set -euo pipefail
          tar -czf '${{ steps.version.outputs.tarball }}' -C /tmp/release frogman/
          ls -lh '${{ steps.version.outputs.tarball }}'

      - name: Verify tarball contents
        run: |
          set -euo pipefail
          # Sanity check: tarball must contain Frogman.class.php, module.xml,
          # and module.sig; module.xml version must match the tag version.
          #
          # `grep -q` exits on first match; combined with `set -o pipefail` this
          # makes `tar | grep -q` fail when grep closes the pipe early (tar gets
          # SIGPIPE). The check ACTUALLY matched, but pipefail saw tar's
          # write-error and failed the step. Drop -q + redirect grep output to
          # /dev/null so grep reads all input and tar finishes cleanly.
          TAR='${{ steps.version.outputs.tarball }}'
          VER='${{ steps.version.outputs.version }}'
          tar -tzf "$TAR" | grep '^frogman/Frogman\.class\.php$' > /dev/null
          tar -tzf "$TAR" | grep '^frogman/module\.xml$' > /dev/null
          tar -tzf "$TAR" | grep '^frogman/module\.sig$' > /dev/null
          tar -xzOf "$TAR" frogman/module.xml \
            | grep "<version>${VER}</version>" > /dev/null \
            || { echo "module.xml version does not match tag ${VER}"; exit 1; }

      - name: Read tag annotation message
        id: tag_message
        run: |
          set -euo pipefail
          # softprops/action-gh-release@v2 does NOT use the tag annotation
          # message automatically — we have to read it ourselves and pass it
          # as `body`. Without this, the release ships with an empty body.
          # (v1.6.4, v1.6.5, v1.6.6 all shipped with empty bodies because this
          # was missing — backfilled retroactively via the API.)
          MSG=$(git for-each-ref "refs/tags/${GITHUB_REF#refs/tags/}" --format='%(contents)')
          {
            echo 'body<<RELEASE_BODY_EOF'
            echo "$MSG"
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          files: ${{ steps.version.outputs.tarball }}
          body: ${{ steps.tag_message.outputs.body }}
          generate_release_notes: false
          fail_on_unmatched_files: true
